<h2>Combat Pokémon</h2>

<label>Choisir Pokémon 1:</label>
<select [(ngModel)]="selected1">
  <option *ngFor="let p of pokemons" [ngValue]="p">{{p.name}}</option>
</select>

<label>Choisir Pokémon 2:</label>
<select [(ngModel)]="selected2">
  <option *ngFor="let p of pokemons" [ngValue]="p">{{p.name}}</option>
</select>

<button (click)="startBattle()">Lancer le combat</button>

<div *ngIf="result">
  <h3>Gagnant: {{result.winner}}</h3>
  <p>Nombre de tours: {{result.turns}}</p>
  <h4>Logs:</h4>
  <ul>
    <li *ngFor="let log of result.logs">{{log}}</li>
  </ul>
</div>
